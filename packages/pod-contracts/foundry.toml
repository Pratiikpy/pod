[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.25"
optimizer = true
optimizer_runs = 200
via_ir = false
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"

[fuzz]
runs = 256

[rpc_endpoints]
valuechain_testnet = "${VALUECHAIN_TESTNET_RPC}"
valuechain_mainnet = "${VALUECHAIN_MAINNET_RPC}"
