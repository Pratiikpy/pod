name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ts:
    name: TypeScript (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build SDKs
        run: |
          pnpm --filter @pod/sosovalue-sdk build
          pnpm --filter @pod/sodex-sdk build
          pnpm --filter @pod/signal-engine build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

  contracts:
    name: Solidity (forge build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/pod-contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install OpenZeppelin
        run: forge install OpenZeppelin/openzeppelin-contracts foundry-rs/forge-std --no-git || true

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vv

      - name: Gas snapshot
        run: forge snapshot --check || true

  format:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check "**/*.{ts,tsx,json,md}"
