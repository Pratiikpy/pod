name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ts:
    name: TypeScript (build + typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from the "packageManager" field in package.json.
      - uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build SDKs
        run: |
          pnpm --filter @pod/sosovalue-sdk build
          pnpm --filter @pod/sodex-sdk build
          pnpm --filter @pod/signal-engine build

      # Exclude the root project (re-included by a negative-only filter) and the
      # Solidity package — it has its own job below, and forge isn't on this runner.
      - name: Typecheck
        run: pnpm -r --if-present --filter='!@pod/pod-contracts' --filter='!pod' typecheck

      - name: Test
        run: pnpm -r --if-present --filter='!@pod/pod-contracts' --filter='!pod' test

  contracts:
    name: Solidity (forge build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/pod-contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install libraries
        run: forge install OpenZeppelin/openzeppelin-contracts foundry-rs/forge-std --no-git || true

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vv
